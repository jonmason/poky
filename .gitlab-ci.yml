image: ghcr.io/siemens/kas/kas:next

 # First do a common bootstrap, and then build all the targets
stages:
  - prep
  - build

# Common job fragment to get a worker ready
.setup:
  stage: build
  interruptible: true
  variables:
    KAS_WORK_DIR: $CI_PROJECT_DIR/work
    SSTATE_DIR: $CI_BUILDS_DIR/persist/sstate
    DL_DIR: $CI_BUILDS_DIR/persist/downloads
    BB_LOGCONFIG: $CI_PROJECT_DIR/ci/logging.yml
  before_script:
    - echo KAS_WORK_DIR = $KAS_WORK_DIR
    - echo SSTATE_DIR = $SSTATE_DIR
    - echo DL_DIR = $DL_DIR
    - rm -rf $KAS_WORK_DIR
    - mkdir --verbose --parents $KAS_WORK_DIR $SSTATE_DIR $DL_DIR
  retry:
    max: 2
    when: stuck_or_timeout_failure

# Generalised fragment to do a Kas build
.build:
  extends: .setup
  script:
    - KASFILES=$(./ci/jobs-to-kas "$CI_JOB_NAME")
    - kas shell --update --force-checkout $KASFILES -c 'cat conf/*.conf'
    - kas build $KASFILES
    - ./ci/check-warnings $KAS_WORK_DIR/build/warnings.log


#
# Build stage, the actual build jobs
#

# Build (and mostly test) jobs for meta-yocto-bsp
beaglebone-yocto:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto

edgerouter:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto

genericx86-64:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto
        TESTING: testimage

genericx86:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto
        TESTING: testimage

# Build and test jobs for all QEMU machines
# Note: poky-tiny and poky-altcfg are technically distros, but treat them here like a kernel
qemuarm64:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, poky-tiny, poky-altcfg, linux-yocto-rt]
        TESTING: testimage

qemuarm:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, poky-tiny, poky-altcfg, linux-yocto-rt]
        TESTING: testimage

qemuarmv5:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, poky-tiny, poky-altcfg, linux-yocto-rt]
        TESTING: testimage

qemumips64:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto
        TESTING: testimage

qemumips:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, linux-yocto-rt]
        TESTING: testimage

qemuppc64:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto
        TESTING: testimage

qemuppc:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, linux-yocto-rt]
        TESTING: testimage

qemuriscv32:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto
        TESTING: testimage

qemuriscv64:
  extends: .build
  parallel:
    matrix:
      - KERNEL: linux-yocto
        TESTING: testimage

qemux86-64:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, poky-tiny, poky-altcfg, linux-yocto-rt]
        TESTING: testimage

qemux86:
  extends: .build
  parallel:
    matrix:
      - KERNEL: [linux-yocto, poky-tiny, poky-altcfg, linux-yocto-rt]
        TESTING: testimage

#
# Utility tasks, not executed automatically
#

delete-dl-dir:
  extends: .setup
  stage: prep
  when: manual
  script:
    - rm -rf $DL_DIR/*

# Delete all sstate
delete-sstate:
  extends: .setup
  stage: prep
  when: manual
  script:
    - rm -rf $SSTATE_DIR/*

# Wipe out old sstate
prune-sstate:
  extends: .setup
  stage: prep
  when: manual
  script:
    - du -h -s $SSTATE_DIR
    - find $SSTATE_DIR -type f -atime +30 -delete
    - du -h -s $SSTATE_DIR

# Report on disk usage
usage:
  extends: .setup
  stage: prep
  when: manual
  script:
    - du -h -s $DL_DIR $SSTATE_DIR $KAS_REPO_REF_DIR $TOOLCHAIN_DIR
